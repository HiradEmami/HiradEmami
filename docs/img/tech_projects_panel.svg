<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- core gradient -->
    <radialGradient id="coreGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#67e8f9"/>
      <stop offset="65%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <style>
      .title {
        font: 700 28px 'Segoe UI', Arial;
        fill: #f8fafc;
        letter-spacing: 2px;
      }
      .subtitle {
        font: 500 13px 'Segoe UI', Arial;
        fill: #94a3b8;
      }
      .cta {
        font: 600 12px 'Segoe UI', Arial;
        fill: #22d3ee;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- core -->
  <g transform="translate(250,200)">
    <circle r="70" fill="url(#coreGrad)" filter="url(#glow)">
      <animate attributeName="r" values="65;80;65" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="28" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- subtle lines -->
  <line x1="80" y1="200" x2="180" y2="200" stroke="#1e293b" stroke-width="2"/>
  <line x1="320" y1="200" x2="420" y2="200" stroke="#1e293b" stroke-width="2"/>

  <!-- text -->
  <text x="250" y="320" text-anchor="middle" class="title">
    PROJECTS
  </text>

  <text x="250" y="350" text-anchor="middle" class="subtitle">
    systems • experiments • research
  </text>

  <text x="250" y="385" text-anchor="middle" class="cta">
    ENTER →
  </text>

</svg>