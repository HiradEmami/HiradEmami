<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100">
  <defs>
    <radialGradient id="g-ai">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#67e8f9"/>
      <stop offset="70%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <style>
      .t{font:600 12px 'Segoe UI'; fill:#e2e8f0; letter-spacing:2px;}
    </style>
  </defs>

  <!-- base -->
  <rect x="10" y="20" width="280" height="60" rx="12"
        fill="#020617" stroke="#334155"/>

  <!-- ambient field -->
  <circle cx="70" cy="50" r="28"
          fill="#22d3ee" opacity="0.05">
    <animate attributeName="r" values="24;32;24" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="70" cy="50" r="20"
          fill="#8b5cf6" opacity="0.05">
    <animate attributeName="r" values="18;26;18" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- core -->
  <circle cx="70" cy="50" r="10"
          fill="url(#g-ai)"
          filter="url(#glow)"/>

  <!-- rotating cognition ring -->
  <circle cx="70" cy="50" r="18"
          fill="none"
          stroke="#67e8f9"
          stroke-opacity="0.25"
          stroke-dasharray="6 10">
    <animateTransform attributeName="transform"
      type="rotate"
      from="0 70 50"
      to="360 70 50"
      dur="8s"
      repeatCount="indefinite"/>
  </circle>

  <!-- label -->
  <text x="185" y="55" text-anchor="middle" class="t">AI DOMAINS</text>
</svg>