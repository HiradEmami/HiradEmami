<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100">
  <defs>
    <linearGradient id="g-web" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <style>.t{font:600 12px 'Segoe UI'; fill:#e2e8f0; letter-spacing:2px;}</style>
  </defs>

  <rect x="10" y="20" width="280" height="60" rx="12" fill="#020617" stroke="#334155"/>

  <!-- rotating ring -->
  <g transform="translate(70 50)">
    <circle r="8" fill="url(#g-web)"/>
    <circle r="16" fill="none" stroke="#67e8f9" stroke-opacity="0.3"
      stroke-dasharray="4 6">
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="180" y="55" text-anchor="middle" class="t">WEBSITE</text>
</svg>