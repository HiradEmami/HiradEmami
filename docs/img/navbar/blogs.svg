<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100">
  <defs>
    <linearGradient id="g-blog" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <style>.t{font:600 12px 'Segoe UI'; fill:#e2e8f0; letter-spacing:2px;}</style>
  </defs>

  <rect x="10" y="20" width="280" height="60" rx="12" fill="#020617" stroke="#334155"/>

  <!-- scan lines -->
  <rect x="45" y="35" width="40" height="2" fill="url(#g-blog)">
    <animate attributeName="y" values="35;65;35" dur="2s" repeatCount="indefinite"/>
  </rect>

  <text x="170" y="55" text-anchor="middle" class="t">BLOGS</text>
</svg>