<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100">
  <defs>
    <linearGradient id="g-home" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
    <style>
      .t{font:600 12px 'Segoe UI'; fill:#e2e8f0; letter-spacing:2px;}
    </style>
  </defs>

  <rect x="10" y="20" width="280" height="60" rx="12" fill="#020617" stroke="#334155"/>

  <!-- pulse core -->
  <circle cx="60" cy="50" r="8" fill="url(#g-home)" filter="url(#glow)">
    <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <text x="160" y="55" text-anchor="middle" class="t">HOME</text>
</svg>