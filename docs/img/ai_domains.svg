<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- core -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#67e8f9"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- links -->
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>

    <!-- glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <style>
      .title {
        font: 700 22px 'Segoe UI', Arial;
        fill: #e2e8f0;
        letter-spacing: 2px;
      }
      .nodeText {
        font: 600 11px 'Segoe UI', Arial;
        fill: #e2e8f0;
      }
    </style>
  </defs>

  <!-- background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- orbit ring -->
  <g transform="translate(250 250)" opacity="0.4">
    <circle r="170" fill="none" stroke="#1e293b" stroke-width="2"/>
    <circle r="150" fill="none" stroke="#22d3ee" stroke-opacity="0.2" stroke-dasharray="6 14">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite"/>
    </circle>
    <circle r="120" fill="none" stroke="#8b5cf6" stroke-opacity="0.2" stroke-dasharray="4 16">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- connections -->
  <g stroke="url(#linkGrad)" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <line x1="250" y1="250" x2="250" y2="80"/>
    <line x1="250" y1="250" x2="400" y2="140"/>
    <line x1="250" y1="250" x2="420" y2="300"/>
    <line x1="250" y1="250" x2="250" y2="420"/>
    <line x1="250" y1="250" x2="90" y2="300"/>
    <line x1="250" y1="250" x2="100" y2="140"/>
  </g>

  <!-- animated signal -->
  <circle r="3" fill="#ffffff">
    <animateMotion dur="3s" repeatCount="indefinite"
      path="M250,250 C260,200 260,150 250,80"/>
  </circle>

  <!-- core -->
  <g transform="translate(250,250)" filter="url(#glow)">
    <circle r="65" fill="url(#coreGrad)">
      <animate attributeName="r" values="60;75;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="25" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle cx="250" cy="80" r="14" fill="#67e8f9"/>
    <circle cx="400" cy="140" r="13" fill="#8b5cf6"/>
    <circle cx="420" cy="300" r="13" fill="#8b5cf6"/>
    <circle cx="250" cy="420" r="14" fill="#67e8f9"/>
    <circle cx="90" cy="300" r="13" fill="#8b5cf6"/>
    <circle cx="100" cy="140" r="13" fill="#8b5cf6"/>
  </g>

  <!-- labels -->
  <text x="250" y="60" text-anchor="middle" class="nodeText">ML / DL</text>
  <text x="410" y="130" class="nodeText">GenAI</text>
  <text x="430" y="310" class="nodeText">Multi-Agent</text>
  <text x="250" y="455" text-anchor="middle" class="nodeText">RL</text>
  <text x="60" y="310" class="nodeText">MLOps</text>
  <text x="60" y="130" class="nodeText">Robotics</text>

  <!-- title -->
  <text x="250" y="30" text-anchor="middle" class="title">
    AI DOMAINS
  </text>

</svg>